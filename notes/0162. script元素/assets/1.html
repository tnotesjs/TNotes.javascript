<!-- 
在使用行内 JavaScript 代码时，要注意代码中不能出现字符串</script>。
比如，下面的代码会导致浏览器报错： 

<script>
  function sayScript() {
    console.log('</script>')
  }
  sayScript()
</script>

浏览器解析行内脚本的方式决定了它在看到字符串 </script> 时，会将其当成结束的 </script> 标签。
想避免这个问题，只需要转义字符“\”即可：
-->

<script>
  function sayScript() {
    console.log('<\/script>')
  }
  sayScript()
</script>
